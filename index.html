<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi PKL ISTN - Dashboard</title>
    <!-- Tailwind CSS & Flowbite untuk UI Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js untuk visualisasi grafik lingkaran -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Animate.css untuk animasi smooth look and feel -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #f7f6f9; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8 animate__animated animate__fadeIn">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 animate__animated animate__slideInDown">
            <div class="flex items-center gap-4">
                <div class="p-4 bg-purple-100 rounded-full text-purple-700">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Absensi PKL ISTN</h1>
                    <p class="text-sm text-gray-500">Dashboard Monitoring & Statistik Siswa</p>
                </div>
            </div>
            <a href="absen.html" class="bg-amber-700 hover:bg-amber-800 text-white px-5 py-3 rounded-xl font-medium shadow-md inline-flex items-center gap-2 transition duration-300 transform hover:-translate-y-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                Menu Input Absen
            </a>
        </div>

        <!-- Statistik Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate__animated animate__fadeInUp">
            <!-- Total -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-purple-600">
                <p class="text-xs font-semibold tracking-wider text-gray-400 uppercase">Total Absensi</p>
                <p id="stat-total" class="text-4xl font-bold text-gray-700 mt-2">0</p>
            </div>
            <!-- Tepat Waktu -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-xs font-semibold tracking-wider text-gray-400 uppercase">Tepat Waktu</p>
                <p id="stat-tepat" class="text-4xl font-bold text-emerald-500 mt-2">0</p>
            </div>
            <!-- Terlambat -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-rose-500">
                <p class="text-xs font-semibold tracking-wider text-gray-400 uppercase">Terlambat</p>
                <p id="stat-lambat" class="text-4xl font-bold text-rose-500 mt-2">0</p>
            </div>
        </div>

        <!-- Main Content (Grafik & Tabel) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Chart Lingkaran -->
            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col items-center justify-center min-h-[350px]">
                <h3 class="text-md font-semibold text-gray-700 mb-4 text-center">Persentase Kehadiran</h3>
                <div class="w-64 h-64">
                    <canvas id="absensiChart"></canvas>
                </div>
            </div>

            <!-- Tabel Riwayat -->
            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm overflow-hidden flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <h3 class="text-md font-semibold text-gray-700">10 Riwayat Absensi Terbaru</h3>
                    </div>
                    <div class="overflow-x-auto rounded-xl">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-800 text-white uppercase text-xs">
                                <tr>
                                    <th class="px-4 py-3">NIS</th>
                                    <th class="px-4 py-3">Nama Siswa</th>
                                    <th class="px-4 py-3">Tanggal</th>
                                    <th class="px-4 py-3">Jam</th>
                                    <th class="px-4 py-3 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-body" class="divide-y divide-gray-100">
                                <!-- Data diisi via JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Core Logika LocalStorage & Chart -->
    <script>
        // 1. Inisialisasi Data Dummy jika LocalStorage kosong
        if (!localStorage.getItem('absensi_data')) {
            let dummyData = [];
            const namaDummy = ['Budi Santoso', 'Dimas Saputra', 'Ahmad Fauzi', 'Fikri Haikal', 'Fakhri', 'Rizky Artayuda', 'Bill', 'Siti Aminah', 'Rian Hidayat', 'Dewi Lestari'];
            
            for (let i = 1; i <= 100; i++) {
                let nis = "20260" + String(i).padStart(2, '0');
                let nama = namaDummy[Math.floor(Math.random() * namaDummy.length)];
                
                let daysAgo = Math.floor(Math.random() * 6);
                let d = new Date();
                d.setDate(d.getDate() - daysAgo);
                let tanggal = d.toISOString().split('T')[0];
                
                let isLate = Math.floor(Math.random() * 2);
                let jamMasuk = isLate ? `08:${String(Math.floor(Math.random() * 59) + 1).padStart(2, '0')}` : `07:${String(Math.floor(Math.random() * 31)).padStart(2, '0')}`;
                let keterangan = isLate ? "Terlambat" : "Tepat Waktu";
                let jamPulang = "16:00";

                dummyData.push({ nis, nama, tanggal, jamMasuk, jamPulang, keterangan });
            }
            localStorage.setItem('absensi_data', JSON.stringify(dummyData));
        }

        // 2. Ambil Data dari LocalStorage
        const absensi = JSON.parse(localStorage.getItem('absensi_data'));

        // 3. Hitung Statistik & Render ke UI
        const total = absensi.length;
        const tepatWaktu = absensi.filter(item => item.keterangan === 'Tepat Waktu').length;
        const terlambat = absensi.filter(item => item.keterangan === 'Terlambat').length;

        document.getElementById('stat-total').innerText = total;
        document.getElementById('stat-tepat').innerText = tepatWaktu;
        document.getElementById('stat-lambat').innerText = terlambat;

        // 4. Render 10 Tabel Riwayat Terbaru
        const tableBody = document.getElementById('tabel-body');
        // Urutkan berdasarkan data paling baru dimasukkan (index terakhir/paling atas)
        const dataTerbaru = [...absensi].reverse().slice(0, 10);

        dataTerbaru.forEach(row => {
            const options = { day: '2-digit', month: 'short', year: 'numeric' };
            const formattedDate = new Date(row.tanggal).toLocaleDateString('id-ID', options);
            
            const badgeClass = row.keterangan === 'Tepat Waktu' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700';

            tableBody.innerHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-4 py-3 font-medium text-gray-600">${row.nis}</td>
                    <td class="px-4 py-3 text-gray-700 font-semibold capitalize">${row.nama}</td>
                    <td class="px-4 py-3 text-gray-500">${formattedDate}</td>
                    <td class="px-4 py-3 text-gray-500 font-mono text-xs">${row.jamMasuk} - ${row.jamPulang}</td>
                    <td class="px-4 py-3 text-center">
                        <span class="${badgeClass} text-xs px-2.5 py-1 rounded-full font-semibold">${row.keterangan}</span>
                    </td>
                </tr>
            `;
        });

        // 5. Render Chart.js (Grafik Lingkaran Ungu & Coklat Tua sesuai mockup)
        const ctx = document.getElementById('absensiChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Tepat Waktu', 'Terlambat'],
                datasets: [{
                    data: [tepatWaktu, terlambat],
                    backgroundColor: ['#4c1d95', '#78350f'],
                    borderWidth: 2,
                    borderColor: '#ffffff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } },
                cutout: '65%'
            }
        });
    </script>
</body>
</html>
