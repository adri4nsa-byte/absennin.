<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Absensi PKL ISTN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #f7f6f9; }
    </style>
</head>
<body class="p-4 md:p-8 animate__animated animate__fadeIn">

    <div class="max-w-2xl mx-auto">
        
        <!-- Tampilan Halaman jika Belum Login (Terproteksi) -->
        <div id="lock-screen" class="hidden bg-white p-8 rounded-2xl shadow-xl text-center space-y-6 max-w-md mx-auto mt-20 animate__animated animate__zoomIn">
            <div class="w-20 h-20 bg-purple-100 text-purple-700 rounded-full flex items-center justify-center mx-auto">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <div>
                <h2 class="text-xl font-bold text-gray-800">Konten Terproteksi</h2>
                <p class="text-sm text-gray-500 mt-1">Silahkan login untuk mengakses Halaman Absen</p>
            </div>
            <button onclick="triggerLoginModal()" class="w-full bg-purple-700 hover:bg-purple-800 text-white font-medium py-3 rounded-xl shadow-md transition duration-200">
                Masuk Akun Admin
            </button>
            <a href="index.html" class="block text-sm text-purple-600 hover:underline">Kembali ke Dashboard</a>
        </div>

        <!-- Form Input Absensi jika Sudah Login -->
        <div id="form-screen" class="hidden bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden animate__animated animate__slideInUp">
            <div class="bg-gradient-to-r from-purple-700 to-purple-900 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold">Form Input Absensi PKL</h2>
                    <p class="text-xs opacity-80">Masukkan data absensi siswa dengan benar</p>
                </div>
                <button onclick="logout()" class="bg-rose-600 hover:bg-rose-700 text-xs px-3 py-2 rounded-lg font-medium transition">Logout</button>
            </div>

            <form id="formAbsen" class="p-6 space-y-4" onsubmit="simpanAbsen(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">NIS</label>
                        <input type="text" id="nis" required placeholder="Contoh: 20261177" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Nama Siswa PKL</label>
                        <input type="text" id="nama" required placeholder="Nama Lengkap" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-purple-500 transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Tanggal</label>
                        <input type="date" id="tanggal" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Jam Masuk</label>
                        <input type="time" id="jamMasuk" value="07:30" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Jam Pulang</label>
                        <input type="time" id="jamPulang" value="16:00" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:border-purple-500 transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">Keterangan Status</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer bg-emerald-50 border border-emerald-200 px-4 py-3 rounded-xl w-full">
                            <input type="radio" name="keterangan" value="Tepat Waktu" checked class="text-emerald-600 focus:ring-emerald-500">
                            <span class="text-emerald-800 font-medium text-sm">Tepat Waktu</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer bg-rose-50 border border-rose-200 px-4 py-3 rounded-xl w-full">
                            <input type="radio" name="keterangan" value="Terlambat" class="text-rose-600 focus:ring-rose-500">
                            <span class="text-rose-800 font-medium text-sm">Terlambat</span>
                        </label>
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <a href="index.html" class="w-1/3 text-center border border-gray-200 hover:bg-gray-50 text-gray-600 font-medium py-3 rounded-xl transition pt-3">
                        Dashboard
                    </a>
                    <button type="submit" class="w-2/3 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-xl shadow-md transition transform active:scale-95">
                        Simpan Absensi
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- Script Proteksi Login & Input Simpan -->
    <script>
        // Set default tanggal hari ini di form
        document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];

        // Cek status login saat halaman dibuka
        window.onload = function() {
            if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
                document.getElementById('form-screen').classList.remove('hidden');
            } else {
                document.getElementById('lock-screen').classList.remove('hidden');
                triggerLoginModal();
            }
        };

        // Fungsi Memunculkan Modal Login Statis SweetAlert2
        function triggerLoginModal() {
            Swal.fire({
                title: 'Login Admin',
                html: `
                    <input type="text" id="swal-username" class="swal2-input" placeholder="Username">
                    <input type="password" id="swal-password" class="swal2-input" placeholder="Password">
                `,
                confirmButtonText: 'Sign In',
                confirmButtonColor: '#6d28d9',
                focusConfirm: false,
                allowOutsideClick: false,
                preConfirm: () => {
                    const username = Swal.getPopup().querySelector('#swal-username').value;
                    const password = Swal.getPopup().querySelector('#swal-password').value;
                    if (!username || !password) {
                        Swal.showValidationMessage(`Harap isi semua field!`)
                    }
                    return { username: username, password: password }
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    if (result.value.username === 'admin' && result.value.password === 'admin22') {
                        sessionStorage.setItem('isAdminLoggedIn', 'true');
                        Swal.fire({
                            icon: 'success',
                            title: 'Berhasil Masuk!',
                            text: 'Membuka form absensi.',
                            timer: 1500,
                            showConfirmButton: false
                        }).then(() => {
                            document.getElementById('lock-screen').classList.add('hidden');
                            document.getElementById('form-screen').classList.remove('hidden');
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Login Gagal',
                            text: 'Username atau Password salah!',
                        }).then(() => {
                            triggerLoginModal(); // Loop jika gagal
                        });
                    }
                }
            });
        }

        // Fungsi Simpan Absen ke LocalStorage
        function simpanAbsen(event) {
            event.preventDefault();

            const nis = document.getElementById('nis').value;
            const nama = document.getElementById('nama').value;
            const tanggal = document.getElementById('tanggal').value;
            const jamMasuk = document.getElementById('jamMasuk').value;
            const jamPulang = document.getElementById('jamPulang').value;
            const keterangan = document.querySelector('input[name="keterangan"]:checked').value;

            // Ambil data lama, masukkan data baru, lalu simpan kembali
            let currentData = JSON.parse(localStorage.getItem('absensi_data')) || [];
            currentData.push({ nis, nama, tanggal, jamMasuk, jamPulang, keterangan });
            localStorage.setItem('absensi_data', JSON.stringify(currentData));

            Swal.fire({
                icon: 'success',
                title: 'Absen Berhasil!',
                text: 'Data siswa telah ditambahkan ke basis data lokal.',
                confirmButtonColor: '#059669',
                confirmButtonText: 'Lihat Dashboard'
            }).then(() => {
                window.location.href = 'index.html';
            });
        }

        // Fungsi Logout
        function logout() {
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
